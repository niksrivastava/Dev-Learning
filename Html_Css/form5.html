<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Job Application</h2>
    <form>
        <label for="Name">Name:</label>
        <br>
        <input type="text" name="textfield1" id="Name">
        <br>
        <label for="Email">Email:</label>
        <br>
        <input type="email" name="textfield2" id="Email">
        <br>
        <label for="Phone">Phone:</label>
        <br>
        <input type="tel" name="textfield1" id="Phone">
        <br>
        <label for="file">Resume:</label>
        <br>
        <input type="file" name="file1" id="file">
        <br>
        <label for="counter">Experience(Years):</label>
        <br>
        <input type="number" name="counter" id="counter" min="0" max="50">
        <br>
        <fieldset>
        <legend>Skills:</legend>
        <br>
        <input type="checkbox" name="checkbox1" id="interest">
        <br>
        <lable for = "interest">HTML</lable>
        <br>
        <input type="checkbox" name="checkbox2" id="interest">
        <br>
        <lable for = "interest">CSS</lable>
        <br>
        <input type="checkbox" name="checkbox3" id="interest">
        <br>
        <lable for = "interest">JS</lable>
        </fieldset>
        <br>
        <label for="Select">Highest Education:</label>
        <br>
        <select name="HS" id="Select">
        <option value="">High School</option>
        <option value="">PG</option>
        <option value="">UG</option></select>
        <br>
        <fieldset>
        <legend>Availability:</legend>
        <br>
        <input type="radio" name="radiobutton" id="radio1">
        <br>
        <lable for = "radio1">Full time</lable>
        <br>
        <input type="radio" name="radiobutton" id="radio2">
        <br>
        <lable for = "radio2">Part time</lable>
        </fieldset>
        <br>
        <label for="comments">Additional Comments:</label>
        <br>
        <textarea name="textarea1" id="comments" rows="3" cols="15" placeholder="Enter your words..."></textarea>
        <input type="button" name="button1" id="submit" value="Submit Application">
    </form>
</body>
</html>
