<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnning Grid in CSS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            width: 100vw;
        }
        .container{
            height: 100%;
            width: 100%;
            display: grid;
            padding: 4rem;
            row-gap: 1rem;
            column-gap: 1rem;
            grid-template-rows: repeat(6, 1fr);
            grid-template-columns: repeat(1, 1fr);

            background-color: rgb(199, 167, 128);
        }
        .item{
            background-color: rgb(150, 117, 180);
            border: 5px solid black;
            color: aliceblue;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }
        /* .header, .footer{
            grid-column-start: 1;
            grid-column-end: 4;
        }
        .sidebar{
            grid-row-start: 2;
            grid-row-end: 4;
        }
        .Content1{
            grid-column-start: 2;
            grid-column-end: 4;
        } */
        @media (min-width: 768px){
            .container{
            grid-template-rows: repeat(4, 1fr);
            grid-template-columns: repeat(3, 1fr);
            }
            .header, .footer{
            grid-column-start: 1;
            grid-column-end: 4;
            }
            .sidebar{
                grid-row-start: 2;
                grid-row-end: 4;
            }
            .Content1{
                grid-column-start: 2;
                grid-column-end: 4;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item header">Header</div>
        <div class="item sidebar">Sidebar</div>
        <div class="item Content1">Content 1</div>
        <div class="item Content2">Content 2</div>
        <div class="item Content3">Content 3</div>
        <div class="item footer">Footer</div>
    </div>
</body>
</html>
